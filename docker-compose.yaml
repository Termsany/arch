services:
  postgres:
    image: postgres:16-alpine
    container_name: arch_saas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-arch_saas}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-arch_saas}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    image: arch-backend
    container_name: arch_saas_migrate
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    command: ["pnpm", "--filter", "@workspace/db", "run", "push"]
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    image: arch-backend
    container_name: arch_saas_backend
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: artifacts/arch-saas/Dockerfile
    image: arch-frontend
    container_name: arch_saas_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  uploads_data:
