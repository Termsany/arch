services:
  postgres:
    image: postgres:16-alpine
    container_name: arch_saas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arch_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - arch_saas_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arch_saas"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    container_name: arch_saas_migrate
    env_file:
      - ./.env.docker
    command:
      [
        "sh",
        "-c",
        "pnpm --filter @workspace/db run push-force && pnpm --filter @workspace/db run seed"
      ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - arch_saas_net
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    container_name: arch_saas_backend
    restart: unless-stopped
    env_file:
      - ./.env.docker
    ports:
      - "4000:4000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - arch_saas_net

  frontend:
    build:
      context: .
      dockerfile: artifacts/arch-saas/Dockerfile
    container_name: arch_saas_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - arch_saas_net

volumes:
  postgres_data:
  backend_uploads:

networks:
  arch_saas_net:
    driver: bridge
